# Reference nginx config (generated at runtime by vast-provision-multigpu.sh).
# Upstream: one server per GPU on FORGE_BASE_PORT + gpu_index (default 7860..7863).
# Listen: NGINX_LB_PORT (default 7777).

upstream sd_forge_backend {
    least_conn;
    server 127.0.0.1:7860 max_fails=3 fail_timeout=60s;
    server 127.0.0.1:7861 max_fails=3 fail_timeout=60s;
    server 127.0.0.1:7862 max_fails=3 fail_timeout=60s;
    server 127.0.0.1:7863 max_fails=3 fail_timeout=60s;
    keepalive 32;
}

server {
    listen 7777;
    listen [::]:7777;
    server_name _;

    client_max_body_size 100m;

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://sd_forge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}
